    background-repeat: no-repeat;
    background-position: center 60%;
    background-size: min(140vw, 1100px) auto;
    opacity: 0.05;
    filter: grayscale(1);
  }

  .frame {
    position: relative;
    z-index: 1;
    width: 100%;
    max-width: 640px;
    display: flex;
    flex-direction: column;
    align-items: center;
    text-align: center;
  }

  /* Eyebrow */
  .eyebrow {
    display: flex;
    align-items: center;
    gap: 14px;
    margin-bottom: 28px;
    color: var(--text-dim);
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px;
    letter-spacing: 0.28em;
    text-transform: uppercase;
  }
  .eyebrow::before, .eyebrow::after {
    content: '';
    width: 28px;
    height: 1px;
    background: linear-gradient(90deg, transparent, var(--stroke-strong));
  }
  .eyebrow::after { background: linear-gradient(90deg, var(--stroke-strong), transparent); }

  /* Wordmark */
  .wordmark-img {
    width: clamp(220px, 46vw, 420px);
    height: auto;
    filter: brightness(1) drop-shadow(0 0 24px rgba(166,169,178,0.12));
    animation: shine 6s ease-in-out infinite;
  }
  @keyframes shine {
    0%, 100% { filter: brightness(0.92) drop-shadow(0 0 24px rgba(166,169,178,0.10)); }
    50% { filter: brightness(1.12) drop-shadow(0 0 30px rgba(166,169,178,0.22)); }
  }

  .tagline {
    margin-top: 18px;
    max-width: 420px;
    color: var(--text-dim);
    font-size: 15px;
    line-height: 1.6;
  }
  .tagline strong { color: var(--text); font-weight: 500; }

  /* Countdown */
  .countdown {
    display: flex;
    gap: 10px;
    margin: 44px 0 8px;
  }
  .plate {
    position: relative;
    width: 76px;
    background: linear-gradient(180deg, var(--bg-plate), #0d0d10);
    border: 1px solid var(--stroke);
    border-radius: 6px;
    padding: 14px 0 10px;
    box-shadow:
      inset 0 1px 0 rgba(255,255,255,0.05),
      0 8px 20px rgba(0,0,0,0.35);
  }
  .plate::before, .plate::after {
    content: '';
    position: absolute;
    width: 4px;
    height: 4px;
    border-radius: 50%;
    background: var(--chrome-3);
    box-shadow: inset 0 1px 1px rgba(0,0,0,0.6), 0 0.5px 0 rgba(255,255,255,0.15);
  }
  .plate::before { top: 6px; left: 6px; }
  .plate::after { top: 6px; right: 6px; }
  .plate-value {
    font-family: 'JetBrains Mono', monospace;
    font-weight: 700;
    font-size: 30px;
    color: var(--chrome-1);
    font-variant-numeric: tabular-nums;
    transition: opacity 0.15s ease;
  }
  .plate-label {
    margin-top: 6px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 9px;
    letter-spacing: 0.18em;
    color: var(--text-dim);
    text-transform: uppercase;
  }
  .colon {
    align-self: center;
    color: var(--chrome-3);
    font-family: 'JetBrains Mono', monospace;
    font-size: 22px;
    padding-bottom: 18px;
  }

  .launch-date {
    color: var(--text-dim);
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    letter-spacing: 0.1em;
    margin-bottom: 40px;
  }

  /* Form */
  form {
    width: 100%;
    max-width: 380px;
    display: flex;
    gap: 8px;
    margin-top: 40px;
  }
  input[type="email"] {
    flex: 1;
    min-width: 0;
    background: var(--bg-elevated);
    border: 1px solid var(--stroke);
    border-radius: 6px;
    padding: 14px 16px;
    color: var(--text);
    font-family: 'Space Grotesk', sans-serif;
    font-size: 14px;
    outline: none;
    transition: border-color 0.2s ease;
  }
  input[type="email"]::placeholder { color: var(--text-dim); }
  input[type="email"]:focus {
    border-color: var(--chrome-2);
  }
  input[type="email"]:focus-visible {
    outline: 2px solid var(--chrome-1);
    outline-offset: 2px;
  }

  button {
    position: relative;
    overflow: hidden;
    background: linear-gradient(160deg, var(--chrome-1), var(--chrome-2) 60%, var(--chrome-3));
    border: none;
    border-radius: 6px;
    padding: 14px 22px;
    color: #0a0a0c;
    font-family: 'Space Grotesk', sans-serif;
    font-weight: 600;
    font-size: 14px;
    cursor: pointer;
    white-space: nowrap;
    transition: transform 0.15s ease;
  }
  button:hover { transform: translateY(-1px); }
  button:focus-visible {
    outline: 2px solid var(--chrome-1);
    outline-offset: 2px;
  }
  button:disabled { opacity: 0.6; cursor: not-allowed; transform: none; }

  .msg {
    margin-top: 14px;
    font-size: 13px;
    min-height: 18px;
    font-family: 'JetBrains Mono', monospace;
  }
  .msg.ok { color: var(--ok); }
  .msg.err { color: var(--danger); }

  /* Amostras de camiseta */
  .swatches {
    display: flex;
    gap: 14px;
    margin-top: 56px;
    width: 100%;
  }
  .swatch {
    flex: 1;
    position: relative;
    aspect-ratio: 1 / 1;
    border-radius: 8px;
    overflow: hidden;
    border: 1px solid var(--stroke);
    background-color: #121214;
    background-image:
      repeating-linear-gradient(0deg, rgba(255,255,255,0.025) 0px, rgba(255,255,255,0.025) 1px, transparent 1px, transparent 3px),
      repeating-linear-gradient(90deg, rgba(0,0,0,0.35) 0px, rgba(0,0,0,0.35) 1px, transparent 1px, transparent 3px),
      radial-gradient(ellipse at 30% 20%, rgba(255,255,255,0.05), transparent 60%);
  }
  .swatch::after {
    content: '';
    position: absolute;
    inset: 0;
    box-shadow: inset 0 0 40px rgba(0,0,0,0.65);
  }
  .swatch-stamp {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    filter: drop-shadow(0 1px 1px rgba(0,0,0,0.6));
    opacity: 0.94;
  }
  .swatch-stamp.icon { width: 34%; }
  .swatch-stamp.word { width: 62%; }
  .swatch-tag {
    position: absolute;
    left: 10px;
    bottom: 10px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 9px;
    letter-spacing: 0.14em;
    color: var(--text-dim);
    text-transform: uppercase;
    background: rgba(10,10,12,0.55);
    padding: 3px 6px;
    border-radius: 3px;
    backdrop-filter: blur(2px);
  }
  .swatches-caption {
    margin-top: 10px;
    color: var(--chrome-3);
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.12em;
    text-transform: uppercase;
  }

  .footer {
    margin-top: 40px;
    color: var(--chrome-3);
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.14em;
    text-transform: uppercase;
  }

  @media (max-width: 420px) {
    .plate { width: 62px; padding: 11px 0 8px; }
    .plate-value { font-size: 24px; }
    form { flex-direction: column; }
  }

  @media (prefers-reduced-motion: reduce) {
    .wordmark { animation: none; background-position: 30% 50%; }
    button:hover { transform: none; }
  }
</style>
</head>

<script>
  // ====== CONFIGURAÇÃO — MUDE ISTO ANTES DE PUBLICAR ======
  // 1) Data/hora do lançamento (formato ISO). Exemplo: daqui a 45 dias a partir de hoje.
  const TARGET_DATE = new Date('2026-08-28T18:00:00');

  // 2) URL da sua API depois do deploy (Railway, etc).
  //    Em desenvolvimento local, deixe como está (localhost:3000).
  const API_URL = 'https://idistopic-api.onrender.com/subscribe';
  // ==========================================================

  function pad(n) { return String(n).padStart(2, '0'); }

  function updateCountdown() {
    const now = new Date();
    const diff = TARGET_DATE - now;

    const els = {
      days: document.getElementById('days'),
      hours: document.getElementById('hours'),
      minutes: document.getElementById('minutes'),
      seconds: document.getElementById('seconds'),
    };

    if (diff <= 0) {
      els.days.textContent = '00';
      els.hours.textContent = '00';
      els.minutes.textContent = '00';
      els.seconds.textContent = '00';
      document.querySelector('.tagline').textContent = 'O Chapter Ø1 já está disponível.';
      clearInterval(timer);
      return;
    }

    const days = Math.floor(diff / (1000 * 60 * 60 * 24));
    const hours = Math.floor((diff / (1000 * 60 * 60)) % 24);
    const minutes = Math.floor((diff / (1000 * 60)) % 60);
    const seconds = Math.floor((diff / 1000) % 60);

    els.days.textContent = pad(days);
    els.hours.textContent = pad(hours);
    els.minutes.textContent = pad(minutes);
    els.seconds.textContent = pad(seconds);
  }

  updateCountdown();
  const timer = setInterval(updateCountdown, 1000);

  // ====== Formulário de inscrição ======
  const form = document.getElementById('subscribeForm');
  const emailInput = document.getElementById('emailInput');
  const submitBtn = document.getElementById('submitBtn');
  const formMsg = document.getElementById('formMsg');

  form.addEventListener('submit', async (e) => {
    e.preventDefault();
    formMsg.textContent = '';
    formMsg.className = 'msg';

    const email = emailInput.value.trim();
    if (!email) return;

    submitBtn.disabled = true;
    submitBtn.textContent = 'Enviando...';

    try {
      const res = await fetch(API_URL, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ email, source: 'landing' }),
      });

      const data = await res.json();

      if (res.status === 201) {
        formMsg.textContent = 'Inscrito. Vamos te avisar no lançamento.';
        formMsg.classList.add('ok');
        emailInput.value = '';
      } else if (res.status === 409) {
        formMsg.textContent = 'Esse e-mail já está na lista.';
        formMsg.classList.add('err');
      } else {
        formMsg.textContent = data.message || 'Algo deu errado. Tente novamente.';
        formMsg.classList.add('err');
      }
    } catch (err) {
      formMsg.textContent = 'Não foi possível conectar ao servidor.';
      formMsg.classList.add('err');
    } finally {
      submitBtn.disabled = false;
      submitBtn.textContent = 'Avise-me';
    }
  });
</script>
